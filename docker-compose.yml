

version: "3.9"

services:

  AI-Powered Document Retrieval System:

    build: .

    container_name: AI-Powered Document Retrieval System

    ports:
      - "8000:8000"

    environment:
      OLLAMA_HOST: http://host.docker.internal:11434

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped